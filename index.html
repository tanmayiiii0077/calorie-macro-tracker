<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Calorie Tracker</title>\n    <style>\n        body { margin: 0; font-family: Arial, sans-serif; background-color: #f2f2f2; color: #333; }\n        .container { max-width: 600px; margin: auto; padding: 20px; }\n        .dark-mode { background-color: #333; color: #f2f2f2; }\n        .hidden { display: none; }\n        .chart { width: 100%; height: 300px; }\n        button { padding: 10px; margin: 5px; cursor: pointer; }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Calorie Tracker</h1>\n        <button id="toggleMode">Switch to Dark Mode</button>\n        <form id="foodForm">\n            <input type="text" id="foodName" placeholder="Food Name" required />\n            <input type="number" id="foodGrams" placeholder="Grams" required />\n            <button type="submit">Add Food</button>\n        </form>\n        <ul id="foodList"></ul>\n        <canvas id="calorieChart" class="chart hidden"></canvas>\n    </div>\n    <script>\n        let foods = [\n            { name: 'Rice', calories: 130, protein: 2.7, carbs: 28, fat: 0.3 },\n            { name: 'Chicken Breast', calories: 165, protein: 31, carbs: 0, fat: 3.6 },\n            { name: 'Dal', calories: 116, protein: 9, carbs: 20, fat: 0.4 },\n            { name: 'Paneer', calories: 296, protein: 25, carbs: 6, fat: 21 },\n            { name: 'Potato', calories: 77, protein: 2, carbs: 17, fat: 0.1 },\n            { name: 'Egg', calories: 155, protein: 13, carbs: 1.1, fat: 10.6 },\n            { name: 'Banana', calories: 89, protein: 1.1, carbs: 23, fat: 0.3 },\n            { name: 'Apple', calories: 52, protein: 0.3, carbs: 14, fat: 0.2 },\n            { name: 'Fish', calories: 206, protein: 22, carbs: 0, fat: 13 },\n            { name: 'Yogurt', calories: 59, protein: 3.5, carbs: 4.7, fat: 3.3 },\n            { name: 'Oats', calories: 68, protein: 2.5, carbs: 12, fat: 1.4 },\n            { name: 'Lentils', calories: 116, protein: 9, carbs: 20, fat: 0.4 },\n            { name: 'Chickpeas', calories: 164, protein: 8.9, carbs: 27.4, fat: 2.6 },\n            { name: 'Onion', calories: 40, protein: 1.1, carbs: 9.3, fat: 0.1 },\n            { name: 'Carrot', calories: 41, protein: 0.9, carbs: 9.6, fat: 0.2 },\n            { name: 'Spinach', calories: 23, protein: 2.9, carbs: 3.6, fat: 0.4 },\n            { name: 'Tomato', calories: 18, protein: 0.9, carbs: 3.9, fat: 0.2 },\n            { name: 'Cucumber', calories: 16, protein: 0.7, carbs: 3.6, fat: 0.1 }\n        ];\n        const foodList = document.getElementById('foodList');\n        const foodForm = document.getElementById('foodForm');\n        const toggleMode = document.getElementById('toggleMode');\n        let darkMode = false;\n\n        function renderFoodList() {\n            foodList.innerHTML = '';\n            foods.forEach(food => {\n                const li = document.createElement('li');\n                li.textContent = `${food.name}: ${food.calories} kcal`;\n                foodList.appendChild(li);\n            });\n        }\n\n        foodForm.onsubmit = (e) => {\n            e.preventDefault();\n            const foodName = document.getElementById('foodName').value;\n            const foodGrams = document.getElementById('foodGrams').value;\n            // Add logic for calculating calories based on grams\n            const food = foods.find(f => f.name.toLowerCase() === foodName.toLowerCase());\n            if (food) {\n                const cal = (food.calories / 100) * foodGrams;\n                alert(`Added ${foodGrams} grams of ${food.name}: ${cal} kcal`);\n            } else {\n                alert('Food not found!');\n            }\n            foodForm.reset();\n            renderFoodList();\n        };\n\n        toggleMode.onclick = () => {\n            darkMode = !darkMode;\n            document.body.classList.toggle('dark-mode', darkMode);\n            toggleMode.textContent = darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode';\n        };\n\n        renderFoodList();\n    </script>\n</body>\n</html>
